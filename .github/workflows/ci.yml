name: ci

on:
  push:
  pull_request:

jobs:
  native-release-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Native validation
        run: ./scripts/validate-artifact.sh

  docker-release-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Docker build
        run: docker build -t spruce-artifact .
      - name: Docker help
        run: docker run --rm spruce-artifact help
      - name: Docker test
        run: docker run --rm spruce-artifact test
      - name: Docker benchmark smoke
        run: docker run --rm spruce-artifact bench n1024-compact125
      - name: Docker maintained gate
        run: docker run --rm spruce-artifact gate
      - name: Docker full validation
        run: docker run --rm spruce-artifact validate
